# =============================================================================
#  Configuration Nginx — HR Manager (derrière WAF)
#  Fichier : /etc/nginx/conf.d/hr-manager.conf
#  OS      : RHEL 9.2 / VMware ESXi
#
#  Architecture :
#  [Client] → HTTPS → [WAF] → HTTP → [Nginx :80] → [Docker :3007]
#
#  Le TLS est terminé au niveau du WAF.
#  Nginx écoute uniquement en HTTP sur l'interface interne.
# =============================================================================

server {
    # Écouter uniquement sur l'interface interne (pas 0.0.0.0)
    listen      172.17.5.198:80;
    server_name 172.17.5.198;   # Remplacer par le FQDN utilisé par le WAF

    # ── Masquer la version Nginx ──────────────────────────────────────────────
    server_tokens off;

    # ── Taille max des uploads ────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Restriction d'accès : uniquement depuis le WAF ───────────────────────
    # Décommenter et renseigner l'IP de votre WAF :
    # allow  <IP_WAF>;
    # deny   all;

    # ── Headers de sécurité (complètent ceux du WAF) ─────────────────────────
    # Commenter ceux que le WAF injecte déjà pour éviter les doublons
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/hr-manager.access.log;
    error_log  /var/log/nginx/hr-manager.error.log warn;

    # ── Proxy vers l'application Node.js/Docker ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3007;
        proxy_http_version 1.1;

        # Transmettre les headers injectés par le WAF
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $http_x_forwarded_for;
        # Indiquer à Express que le client original était en HTTPS
        proxy_set_header   X-Forwarded-Proto https;

        # WebSocket support (notifications temps réel)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffers
        proxy_buffering   on;
        proxy_buffer_size 4k;
        proxy_buffers     8 4k;
    }

    # ── Bloquer l'accès aux fichiers sensibles ────────────────────────────────
    location ~ /\.(env|git|gitignore|dockerignore) {
        deny all;
        return 404;
    }

    location ~ \.(sql|sh|log|bak)$ {
        deny all;
        return 404;
    }
}

# =============================================================================
#  INSTRUCTIONS D'INSTALLATION
# =============================================================================
#
#  1. Installer Nginx :
#     dnf install nginx -y
#     systemctl enable --now nginx
#
#  2. Copier la config :
#     cp hr-manager.nginx.conf /etc/nginx/conf.d/hr-manager.conf
#
#  3. Décommenter et renseigner l'IP du WAF dans le bloc allow/deny :
#     allow  <IP_WAF>;
#     deny   all;
#
#  4. Tester et recharger :
#     nginx -t && systemctl reload nginx
#
#  5. Restreindre le firewall — port 80 uniquement depuis le WAF :
#     firewall-cmd --permanent --add-rich-rule=\
#       'rule family=ipv4 source address=<IP_WAF>/32 port port=80 protocol=tcp accept'
#     firewall-cmd --permanent --remove-service=http
#     firewall-cmd --reload
#
#  6. Dans server.js, activer trust proxy pour que req.ip = IP réelle du client :
#     app.set('trust proxy', 1);
#
#  7. Mettre à jour ALLOWED_ORIGINS dans patch_server.js avec le domaine
#     public du WAF (ex: 'https://hr.monetiquetunisie.tn')
#
#  8. Tester depuis le WAF :
#     curl -I http://172.17.5.198/
#     # Doit retourner HTTP/1.1 200 avec les headers de sécurité
