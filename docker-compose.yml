name: hr_manager

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr_manager_app
    restart: unless-stopped
    env_file: backend/.env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      NODE_ENV: production
    ports:
      - "3007:5005"
    volumes:
      - uploads:/app/uploads
      - /data/applications/hr-manager/logo_smt.png:/app/logo_smt.png:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hr_manager_network

  postgres:
    image: postgres:16-alpine
    container_name: hr_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PG_DATABASE:-hr_manager}
      POSTGRES_USER:     ${PG_USER:-hr_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-REDACTED_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-hr_user} -d ${PG_DATABASE:-hr_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hr_manager_network

volumes:
  pg_data:
    name: hr_manager_pg_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/applications/hr-manager/pgdata

  uploads:
    name: hr_manager_uploads
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/applications/hr-manager/uploads

networks:
  hr_manager_network:
    name: hr_manager_network
    driver: bridge
